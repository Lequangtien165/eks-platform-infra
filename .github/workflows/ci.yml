name: ci

on:
  push:
    branches:
      - main
    paths:
      - "sample-app-gitops/app/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "sample-app-gitops/app/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: sample-app
  DEV_VALUES_FILE: sample-app-gitops/envs/dev/values.yaml

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sample-app-gitops/app/requirements.txt

      - name: Install Python dependencies
        working-directory: sample-app-gitops/app
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Smoke test FastAPI app import
        working-directory: sample-app-gitops/app
        run: |
          python -c "from main import app; print(app.title)"

  build-scan-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set image tag
        id: image
        run: |
          image_tag="${GITHUB_SHA::12}"
          echo "IMAGE_TAG=${image_tag}" >> "$GITHUB_ENV"
          echo "tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Build Docker image
        working-directory: sample-app-gitops/app
        run: |
          docker build \
            -t ${{ env.ECR_REPOSITORY }}:${{ steps.image.outputs.tag }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image.outputs.tag }} \
            .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image.outputs.tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image.outputs.tag }}

      - name: Update dev image tag
        run: |
          sed -i -E 's/tag: ".*"/tag: "'"${IMAGE_TAG}"'"/' "$DEV_VALUES_FILE"

      - name: Commit updated dev values
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add "$DEV_VALUES_FILE"
          git diff --cached --quiet || git commit -m "Update dev image tag to ${IMAGE_TAG}"

      - name: Push updated dev values
        run: |
          git push origin HEAD:${{ github.ref_name }}
