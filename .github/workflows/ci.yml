name: ci

on:
  push:
    branches:
      - main
    paths:
      - "sample-app-gitops/app/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: sample-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test-build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        working-directory: sample-app-gitops/app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test app import
        working-directory: sample-app-gitops/app
        run: |
          python -c "from main import app; print(app.title)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        working-directory: sample-app-gitops/app
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .

      - name: Tag Docker image
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Update dev image tag
        run: |
          sed -i 's/tag: ".*"/tag: "${{ env.IMAGE_TAG }}"/' sample-app-gitops/envs/dev/values.yaml

      - name: Commit updated dev values
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add sample-app-gitops/envs/dev/values.yaml
          git diff --cached --quiet || git commit -m "Update dev image tag to ${{ env.IMAGE_TAG }}"

      - name: Push updated dev values
        run: |
          git push
