apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app-dev
  namespace: argocd
spec:
  project: sample-app
  source:
    repoURL: __GIT_REPO_URL__
    targetRevision: main
    path: sample-app-gitops/helm/sample-app
    helm:
      valueFiles:
        - ../../envs/dev/values.yaml
      parameters:
        - name: image.repository
          value: __ECR_REPOSITORY_URI__
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
